<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Expense Tracker</h1>
    <p>This app will track expenses using JavaScript</p>


    <!-- Expense form -->
    <form id="expenseForm">

      <!-- User enters expense name -->
      <label for="expenseName">Expense Name:</label>
      <input type="text" id="expenseName" placeholder="Example: Lunch">

      <!-- User enters expense amount -->
      <label for="expenseAmount">Amount:</label>
      <input type="number" id="expenseAmount" placeholder="Example: 150">

      <!-- User selects category -->
      <label for="expenseCategory">Category:</label>
      <select id="expenseCategory">
        <option value="Food">Food</option>
        <option value="Transportation">Transportation</option>
        <option value="School">School</option>
        <option value="Other">Other</option>
      </select>

      <!-- User selects currency -->
      <label for="expenseCurrency">Currency:</label>
      <select id="expenseCurrency">
        <option value="USD">USD</option>
        <option value="PHP">PHP</option>
      </select>

      <!-- Submit button -->
      <button type="submit">Add Expense</button>

    </form>
    <!-- This section will display the list of expenses -->
    <h2>Expense List</h2>
    <ul id="expenseList"></ul>


    <!-- This section will show the running total -->
    <h2>Total</h2>

    <!-- User chooses whether to see total in USD or PHP -->
    <label for="totalCurrency">Show Total In:</label>
    <select id="totalCurrency" onchange="setDisplayCurrency(this.value)">
      <option value="USD">USD</option>
      <option value="PHP">PHP</option>
    </select>

    <p id="totalAmount">$0.00</p>

  </main>
  <script src="script.js"></script>
</body>
</html>
